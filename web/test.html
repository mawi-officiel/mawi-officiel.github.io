<!doctype html>
<html lang="ar">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>كاميرا داخل الصفحة — معاينة دائرية وتحميل</title>
<style>
  :root{font-family: Arial, "Noto Kufi Arabic", sans-serif}
  body{display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px;background:#0f1724;color:#e6eef8}
  .camera-wrap{position:relative;width:320px;max-width:94vw;border-radius:12px;overflow:hidden;background:#000}
  video{width:100%;height:auto;display:block;transform:scaleX(1);} /* flip if front camera later */
  /* الدائرة التوضيحية (نصف شفافة) */
  .overlay{
    pointer-events:none;
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  }
  .circle{
    width:70%;aspect-ratio:1/1;border-radius:50%;
    box-shadow:0 0 0 9999px rgba(0,0,0,0.45),0 0 0 4px rgba(255,255,255,0.12) inset;
    border:2px dashed rgba(255,255,255,0.15);
  }
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  button{padding:8px 12px;border-radius:8px;border:0;background:#1e3254;color:#fff;cursor:pointer}
  button:disabled{opacity:0.45;cursor:not-allowed}
  .previews{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px}
  .previews img{width:140px;height:auto;border-radius:8px;background:#111;padding:6px}
  p.note{font-size:13px;color:#bcd3ff;opacity:0.9}
</style>
</head>
<body>
  <h2>كاميرا الصفحة — معرض دائري + تحميل</h2>
  <div class="camera-wrap" id="cameraWrap">
    <video id="video" autoplay playsinline></video>
    <div class="overlay" aria-hidden="true">
      <div class="circle"></div>
    </div>
  </div>

  <div class="controls">
    <button id="btnStart">تشغيل الكاميرا</button>
    <button id="btnCaptureRect" disabled>التقاط (مستطيل)</button>
    <button id="btnCaptureCircle" disabled>التقاط (دائري)</button>
    <button id="btnSwitch" disabled>تبديل الكاميرا</button>
  </div>

  <p class="note">ملاحظة: الدائرة مجرد قناع مرئي. الصورة الحقيقية محفوظة مستطيلة. سيحاول المتصفح استخدام Photo API إن وُجد.</p>

  <div class="previews" id="previews"></div>

<script>
(async () => {
  const video = document.getElementById('video');
  const btnStart = document.getElementById('btnStart');
  const btnCaptureRect = document.getElementById('btnCaptureRect');
  const btnCaptureCircle = document.getElementById('btnCaptureCircle');
  const btnSwitch = document.getElementById('btnSwitch');
  const previews = document.getElementById('previews');

  let stream = null;
  let currentFacing = 'environment'; // or 'user'
  let track = null;
  let imageCapture = null;

  async function startCamera() {
    if (stream) stopCamera();
    try {
      // نطلب قدرًا كبيرًا من الدقة كاقتراح (لكن تعتمد على الجهاز)
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacing, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      track = stream.getVideoTracks()[0];

      // حاول إنشاء ImageCapture إن وُجد
      try {
        imageCapture = new ImageCapture(track);
      } catch (e) {
        imageCapture = null;
      }

      btnCaptureRect.disabled = false;
      btnCaptureCircle.disabled = false;
      btnSwitch.disabled = true; // نفعل بعد التأكد من وجود أكثر من كاميرا
      // تحقق من وجود كاميرات أخرى
      const devices = await navigator.mediaDevices.enumerateDevices();
      const videoCount = devices.filter(d => d.kind === 'videoinput').length;
      if (videoCount > 1) btnSwitch.disabled = false;

    } catch (err) {
      alert('خطأ الحصول على الكاميرا: ' + err.message);
      console.error(err);
    }
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
      imageCapture = null;
    }
    btnCaptureRect.disabled = true;
    btnCaptureCircle.disabled = true;
  }

  async function captureRectangular() {
    // إن كان ImageCapture مدعومًا، حاول takePhoto()
    if (imageCapture && typeof imageCapture.takePhoto === 'function') {
      try {
        const blob = await imageCapture.takePhoto();
        savePreviewBlob(blob, 'capture-raw.jpg');
        return;
      } catch (e) {
        console.warn('takePhoto failed, falling back to canvas:', e);
        // نستمر إلى طريقة الرسم على كانفاس
      }
    }
    // fallback: draw current video frame إلى كانفاس بالحجم الفعلي المعروض
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth || video.clientWidth;
    canvas.height = video.videoHeight || video.clientHeight;
    const ctx = canvas.getContext('2d');
    // إذا كان الفيديو مقلوب في المحور X (front camera) يمكنك عكسه إذا أردت
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    canvas.toBlob(blob => {
      savePreviewBlob(blob, 'capture-rect.png');
    }, 'image/png', 0.92);
  }

  async function captureCircular() {
    // نرسم إطار الفيديو على كانفاس ثم نستخدم قناع دائري ونصدر PNG بشفاف خارج الدائرة
    const vw = video.videoWidth || video.clientWidth;
    const vh = video.videoHeight || video.clientHeight;
    // نحدد قطر الدائرة ليكون الحد الأدنى من الأبعاد (نحتفظ بنسبة العرض)
    const diameter = Math.min(vw, vh) * 0.9; // 90% داخل الإطار
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(diameter);
    canvas.height = Math.round(diameter);
    const ctx = canvas.getContext('2d');

    // نحتاج أولًا أن نحدد من أين نأخذ المربّع داخل الفيديو (مركز المستطيل)
    // نأخذ مربعًا مركزياً بحجم diameter
    const sx = Math.round((vw - diameter) / 2);
    const sy = Math.round((vh - diameter) / 2);

    // ارسم المربّع من الفيديو على الكانفاس الجديد
    ctx.drawImage(video, sx, sy, diameter, diameter, 0, 0, diameter, diameter);

    // الآن نطبّق قناع دائري لجعل الخلفية شفافة خارج الدائرة
    const out = document.createElement('canvas');
    out.width = canvas.width;
    out.height = canvas.height;
    const oc = out.getContext('2d');

    // ابدأ بقناع شفاف
    oc.clearRect(0,0,out.width,out.height);
    oc.save();
    oc.beginPath();
    oc.arc(out.width/2, out.height/2, out.width/2, 0, Math.PI*2);
    oc.closePath();
    oc.clip();

    // ارسم الصورة المقطوعة داخل القناع
    oc.drawImage(canvas, 0, 0);

    oc.restore();

    out.toBlob(blob => {
      savePreviewBlob(blob, 'capture-circle.png');
    }, 'image/png');
  }

  function savePreviewBlob(blob, name) {
    const url = URL.createObjectURL(blob);
    const img = document.createElement('img');
    img.src = url;
    img.alt = name;
    // زر تحميل
    const link = document.createElement('a');
    link.href = url;
    link.download = name;
    link.textContent = 'تحميل';
    link.style.display = 'block';
    link.style.textDecoration = 'none';
    link.style.color = '#bcd3ff';
    const container = document.createElement('div');
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.alignItems = 'center';
    container.appendChild(img);
    container.appendChild(link);
    // إضافة إمكانية عرض تفاصيل (حجم)
    const info = document.createElement('div');
    info.style.fontSize = '12px';
    info.style.opacity = '0.85';
    info.textContent = `${Math.round(blob.size/1024)} KB`;
    container.appendChild(info);

    previews.prepend(container);

    // تخلص من URL بعد قليل (أو يمكن تركه)
    setTimeout(()=> URL.revokeObjectURL(url), 60_000);
  }

  btnStart.addEventListener('click', async () => {
    await startCamera();
  });

  btnCaptureRect.addEventListener('click', () => {
    captureRectangular();
  });

  btnCaptureCircle.addEventListener('click', () => {
    captureCircular();
  });

  btnSwitch.addEventListener('click', async () => {
    // تبديل بين الكاميرا الخلفية والأمامية
    currentFacing = (currentFacing === 'environment') ? 'user' : 'environment';
    await startCamera();
  });

  // تنظيف عند المغادرة
  window.addEventListener('unload', () => stopCamera());

})();
</script>
</body>
</html>
